<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library | Premium Edition</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4338ca;
            --accent: #f472b6;
            --bg-gradient: linear-gradient(120deg, #6366f1 0%, #60a5fa 100%);
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-radius: 18px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            position: relative;
        }

        /* Hero Gradient */
        .hero-section {
            background: var(--bg-gradient);
            color: #fff;
            padding: 3.5rem 0 2.5rem 0;
            border-radius: 0 0 2.5rem 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.10);
            position: relative;
            overflow: hidden;
        }

        .hero-section .display-4 {
            font-weight: 800;
            letter-spacing: -1.5px;
            text-shadow: 0 2px 16px rgba(60, 60, 120, 0.10);
        }

        .hero-section .lead {
            font-size: 1.25rem;
            color: #e0e7ff;
            font-weight: 500;
        }

        /* Animated Background Shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.18;
            filter: blur(12px);
            z-index: 0;
        }

        .bg-shape-1 {
            width: 320px;
            height: 320px;
            background: #f472b6;
            top: -80px;
            left: -100px;
            animation: float1 8s ease-in-out infinite alternate;
        }

        .bg-shape-2 {
            width: 220px;
            height: 220px;
            background: #60a5fa;
            bottom: -60px;
            right: -60px;
            animation: float2 10s ease-in-out infinite alternate;
        }

        @keyframes float1 {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(30px) scale(1.08);
            }
        }

        @keyframes float2 {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-20px) scale(1.04);
            }
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.90) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 1rem 0;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.02);
        }

        .navbar-brand {
            color: var(--primary-color) !important;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-color) !important;
        }

        /* Form Controls Formatting */
        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 0.7rem 1.1rem;
            box-shadow: none !important;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.13) !important;
        }

        /* Premium Buttons */
        .btn {
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 0.2px;
            padding: 0.7rem 1.3rem;
            transition: all 0.18s cubic-bezier(.4, 0, .2, 1);
        }

        .btn-primary {
            background: linear-gradient(90deg, #6366f1 0%, #60a5fa 100%);
            border: none;
            color: #fff;
            box-shadow: 0 2px 8px 0 rgba(99, 102, 241, 0.10);
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #4338ca 0%, #2563eb 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 24px 0 rgba(99, 102, 241, 0.18);
        }

        .btn-accent {
            background: linear-gradient(90deg, #f472b6 0%, #fbbf24 100%);
            color: #fff;
            border: none;
            box-shadow: 0 2px 8px 0 rgba(244, 114, 182, 0.10);
        }

        .btn-accent:hover {
            background: linear-gradient(90deg, #f472b6 0%, #f59e42 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 8px 24px 0 rgba(244, 114, 182, 0.18);
        }

        .btn-light {
            background-color: #f1f5f9;
            border-color: transparent;
            color: var(--text-main);
        }

        .btn-light:hover {
            background-color: #e2e8f0;
            color: var(--text-main);
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            right: 32px;
            bottom: 40px;
            z-index: 1200;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(120deg, #6366f1 0%, #f472b6 100%);
            color: #fff;
            box-shadow: 0 8px 32px 0 rgba(99, 102, 241, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.2s;
            border: none;
            outline: none;
            animation: fabpop 1.2s cubic-bezier(.4, 0, .2, 1);
        }

        .fab:hover {
            box-shadow: 0 16px 48px 0 rgba(99, 102, 241, 0.28);
            transform: scale(1.08);
        }

        @keyframes fabpop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }

            80% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Modern Cards */
        .card {
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: var(--card-radius);
            background: #fff;
            box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.06);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-7px) scale(1.02);
            box-shadow: 0 20px 32px -5px rgba(99, 102, 241, 0.10);
        }

        .card-body {
            padding: 2rem 1.5rem 1.5rem 1.5rem;
        }

        .card-title {
            font-size: 1.18rem;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            line-height: 1.4;
        }

        .card-subtitle {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.98rem;
            margin-bottom: 1.25rem;
        }

        .card-divider {
            height: 1px;
            background-color: #f1f5f9;
            margin: 1rem 0;
        }

        .badge-custom {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 500;
            border-radius: 7px;
            padding: 0.45em 0.8em;
            font-size: 0.78rem;
            border: 1px solid #e2e8f0;
        }

        /* Book Cover Placeholder */
        .book-cover-placeholder {
            width: 100%;
            height: 160px;
            background: linear-gradient(120deg, #6366f1 0%, #f472b6 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            position: relative;
            overflow: hidden;
        }

        .book-cover-placeholder img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 4px 16px 0 rgba(99, 102, 241, 0.13);
            background: #fff;
        }

        .author-badge {
            position: absolute;
            bottom: 10px;
            left: 16px;
            background: rgba(255, 255, 255, 0.85);
            color: var(--primary-color);
            font-size: 0.92rem;
            font-weight: 600;
            border-radius: 6px;
            padding: 0.2em 0.7em;
            box-shadow: 0 2px 8px 0 rgba(99, 102, 241, 0.08);
        }

        /* Modal Polish */
        .modal-content {
            border: none;
            border-radius: var(--card-radius);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.18);
        }

        .modal-header {
            border-bottom: 1px solid #f1f5f9;
            padding: 1.5rem;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-title {
            font-weight: 800;
            color: var(--primary-color);
        }

        /* Utility */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(4px);
            z-index: 1050;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #alertContainer {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1060;
            min-width: 320px;
        }

        .alert {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.10);
        }

        /* Footer */
        .footer {
            background: #fff;
            border-top: 1px solid #e5e7eb;
            color: #64748b;
            font-size: 1rem;
            padding: 1.5rem 0 1rem 0;
            text-align: center;
            margin-top: 3rem;
        }

        .footer .bi {
            color: var(--primary-color);
            margin: 0 0.5rem;
            font-size: 1.3rem;
            vertical-align: middle;
            transition: color 0.2s;
        }

        .footer .bi:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <!-- Hero Section -->
    <section class="hero-section position-relative mb-4">
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <nav class="navbar navbar-expand-lg sticky-top mb-0">
            <div class="container">
                <a class="navbar-brand" href="#" onclick="clearSearch(); loadBooks(); return false;">
                    <i class="bi bi-book-half me-2"></i>BookStack
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <i class="bi bi-list fs-3 text-dark"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto ps-lg-4">
                        <li class="nav-item">
                            <a class="nav-link active" href="#"
                                onclick="clearSearch(); loadBooks(); return false;">Library</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" onclick="openAddModal(); return false;"><i
                                    class="bi bi-plus-circle me-1"></i> Add Book</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
                        <select id="formatSelect" class="form-select w-auto bg-light border-0 fw-medium text-secondary"
                            onchange="loadBooks()" title="API Format">
                            <option value="json" selected>JSON</option>
                            <option value="xml">XML</option>
                            <option value="text">TEXT</option>
                        </select>
                        <form class="d-flex position-relative" onsubmit="event.preventDefault(); searchBooks();">
                            <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted"
                                style="left: 12px;"></i>
                            <input class="form-control bg-light border-0 ps-5" type="search" id="searchInput"
                                placeholder="Search library..." style="width: 220px;" required>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container position-relative z-1 text-center pt-4 pb-2">
            <h1 class="display-4 mb-2">Your Handsome Book Library</h1>
            <p class="lead mb-0">A beautiful, professional, and modern way to manage your collection.</p>
        </div>
    </section>
    <!-- Alerts -->
    <div id="alertContainer"></div>
    <!-- Loading Spinner -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-border text-primary shadow-sm" style="width: 3.5rem; height: 3.5rem; border-width: 0.25em;"
            role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <h5 class="mt-4 fw-medium text-secondary" style="letter-spacing: 0.5px;">Syncing Library...</h5>
    </div>
    <!-- Main Content -->
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0 text-dark">My Collection</h2>
        </div>
        <div id="searchResultsIndicator" class="alert alert-light border d-none mb-4 d-flex align-items-center">
            <i class="bi bi-info-circle me-2 text-primary"></i>
            <span id="searchResultText"></span>
            <button class="btn btn-sm btn-light ms-auto rounded-pill px-3" onclick="clearSearch(); loadBooks();">Clear
                Filter</button>
        </div>
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4" id="booksContainer">
            <!-- Book Cards will be injected here -->
        </div>
        <!-- Floating Action Button -->
        <button class="fab shadow-lg" title="Add Book" onclick="openAddModal()">
            <i class="bi bi-plus-lg"></i>
        </button>
    </div>
    <!-- Book Form Modal -->
    <div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-white">
                    <h5 class="modal-title fs-4" id="bookModalLabel">Add New Book</h5>
                    <button type="button" class="btn-close bg-light rounded-circle p-2" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="bookForm" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="bookId">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1">Book Title</label>
                            <input type="text" id="title" class="form-control form-control-lg fs-6"
                                placeholder="e.g. The Great Gatsby" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1">Author</label>
                            <input type="text" id="author" class="form-control form-control-lg fs-6"
                                placeholder="e.g. F. Scott Fitzgerald" required>
                        </div>
                        <div class="row mb-3 g-3">
                            <div class="col-sm-5">
                                <label class="form-label text-muted small fw-bold text-uppercase mb-1">Publish
                                    Date</label>
                                <input type="text" id="date" class="form-control form-control-lg fs-6"
                                    placeholder="YYYY-MM-DD">
                            </div>
                            <div class="col-sm-7">
                                <label class="form-label text-muted small fw-bold text-uppercase mb-1">Genres</label>
                                <input type="text" id="genres" class="form-control form-control-lg fs-6"
                                    placeholder="Fiction, Classic...">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1">Key
                                Characters</label>
                            <input type="text" id="characters" class="form-control form-control-lg fs-6"
                                placeholder="Jay Gatsby, Nick Carraway...">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold text-uppercase mb-1">Synopsis</label>
                            <textarea id="synopsis" class="form-control fs-6" rows="4"
                                placeholder="Brief summary of the book..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1" id="submitBtn">Save Book</button>
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap & JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = '/Book/BookAPI';
        let currentBooks = [];
        let bookModal;
        document.addEventListener("DOMContentLoaded", () => {
            bookModal = new bootstrap.Modal(document.getElementById('bookModal'));
            loadBooks();
        });
        function getFormat() {
            return document.getElementById('formatSelect').value;
        }
        function showSpinner() {
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        function hideSpinner() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
        function showAlert(message, type = 'success') {
            const container = document.getElementById('alertContainer');
            const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill';
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show d-flex align-items-center" role="alert">
                    <i class="bi ${icon} fs-5 me-2"></i>
                    <div>${message}</div>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            container.innerHTML = alertHtml;
            setTimeout(() => { container.innerHTML = ''; }, 4000);
        }
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResultsIndicator').classList.add('d-none');
        }
        async function loadBooks(searchQuery = '') {
            showSpinner();
            const format = getFormat();
            let url = `${API_URL}?format=${format}`;
            if (searchQuery) url += `&search=${encodeURIComponent(searchQuery)}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const rawData = await response.text();
                currentBooks = parseResponse(rawData, format);
                const indicator = document.getElementById('searchResultsIndicator');
                if (searchQuery) {
                    indicator.classList.remove('d-none');
                    document.getElementById('searchResultText').innerHTML = `Found <strong class="text-dark">${currentBooks.length}</strong> matches for <strong class="text-dark">"${searchQuery}"</strong>`;
                } else {
                    indicator.classList.add('d-none');
                }
                renderCards(currentBooks);
            } catch (error) {
                showAlert('Failed to fetch books: ' + error.message, 'danger');
                renderCards([]);
            } finally {
                hideSpinner();
            }
        }
        async function searchBooks() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                loadBooks(query);
            } else {
                clearSearch();
                loadBooks();
            }
        }
        function openAddModal() {
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('bookModalLabel').innerText = 'Add New Book';
            document.getElementById('submitBtn').innerText = 'Save Book';
            bookModal.show();
        }
        function openEditModal(id) {
            const book = currentBooks.find(b => parseInt(b.id) === parseInt(id));
            if (!book) return;
            document.getElementById('bookId').value = book.id;
            document.getElementById('title').value = book.title;
            document.getElementById('author').value = book.author;
            document.getElementById('date').value = book.date;
            document.getElementById('genres').value = book.genres;
            document.getElementById('characters').value = book.characters;
            document.getElementById('synopsis').value = book.synopsis;
            document.getElementById('bookModalLabel').innerText = 'Edit Book';
            document.getElementById('submitBtn').innerText = 'Update Book';
            bookModal.show();
        }
        async function handleFormSubmit(event) {
            event.preventDefault();
            const id = document.getElementById('bookId').value;
            const isEdit = id !== '';
            const book = {
                id: isEdit ? parseInt(id) : 0,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                date: document.getElementById('date').value,
                genres: document.getElementById('genres').value,
                characters: document.getElementById('characters').value,
                synopsis: document.getElementById('synopsis').value
            };
            const format = getFormat();
            const method = isEdit ? 'PUT' : 'POST';
            const contentType = format === 'xml' ? 'application/xml' : 'application/json';
            let payload = '';
            if (format === 'xml') {
                payload = `<?xml version="1.0" encoding="UTF-8"?><book><author>${book.author}</author><characters>${book.characters}</characters><date>${book.date}</date><genres>${book.genres}</genres><id>${book.id}</id><synopsis>${book.synopsis}</synopsis><title>${book.title}</title></book>`;
            } else {
                payload = JSON.stringify(book);
            }
            showSpinner();
            try {
                const response = await fetch(`${API_URL}?format=${format}`, {
                    method: method,
                    headers: { 'Content-Type': contentType },
                    body: payload
                });
                if (response.ok) {
                    showAlert(`Book successfully ${isEdit ? 'updated' : 'added'}!`, 'success');
                    bookModal.hide();
                    loadBooks(document.getElementById('searchInput').value.trim());
                } else {
                    const errText = await response.text();
                    showAlert(`Error: ${response.status} - ${errText}`, 'danger');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'danger');
            } finally {
                hideSpinner();
            }
        }
        async function deleteBook(id, title) {
            if (!confirm(`Are you sure you want to completely remove "${title}" from the library?`)) return;
            showSpinner();
            const format = getFormat();
            try {
                const response = await fetch(`${API_URL}?id=${id}&format=${format}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('Item permanently deleted.', 'success');
                    loadBooks(document.getElementById('searchInput').value.trim());
                } else {
                    showAlert(`Failed deletion: ${response.status}`, 'danger');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'danger');
            } finally {
                hideSpinner();
            }
        }
        function parseResponse(rawData, format) {
            let books = [];
            if (!rawData || rawData.trim() === '') return books;
            if (format === 'json') {
                books = JSON.parse(rawData);
                if (!Array.isArray(books)) books = [books];
            } else if (format === 'xml') {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(rawData, "application/xml");
                const nodes = xmlDoc.getElementsByTagName("book");
                for (let i = 0; i < nodes.length; i++) {
                    books.push({
                        id: nodes[i].getElementsByTagName("id")[0]?.textContent || '',
                        title: nodes[i].getElementsByTagName("title")[0]?.textContent || '',
                        author: nodes[i].getElementsByTagName("author")[0]?.textContent || '',
                        date: nodes[i].getElementsByTagName("date")[0]?.textContent || '',
                        genres: nodes[i].getElementsByTagName("genres")[0]?.textContent || '',
                        characters: nodes[i].getElementsByTagName("characters")[0]?.textContent || '',
                        synopsis: nodes[i].getElementsByTagName("synopsis")[0]?.textContent || ''
                    });
                }
            } else if (format === 'text') {
                const lines = rawData.split('\n');
                const regex = /Book\[(\d+)\]\s(.*?) by (.*?)\s\((.*?)\)\s-\sGenres:\s(.*?)\s\|\sCharacters:\s(.*?)\s\|\sSynopsis:\s(.*)/;
                lines.forEach(line => {
                    const match = line.trim().match(regex);
                    if (match) {
                        books.push({
                            id: match[1], title: match[2], author: match[3],
                            date: match[4], genres: match[5],
                            characters: match[6], synopsis: match[7]
                        });
                    }
                });
            }
            return books;
        }

        function renderCards(books) {
            const container = document.getElementById('booksContainer');
            container.innerHTML = '';
            if (books.length === 0) {
                container.innerHTML = `
                    <div class="col-12 w-100 mt-5">
                        <div class="text-center p-5 bg-white rounded-4 border">
                            <i class="bi bi-journal-x display-1 text-light mb-3"></i>
                            <h3 class="text-muted fw-bold">No books found</h3>
                            <p class="text-secondary mb-4">Your library query didn't match any literary works.</p>
                            <button class="btn btn-primary px-4 rounded-pill" onclick="openAddModal()">Add your first book</button>
                        </div>
                    </div>`;
                return;
            }
            // Reverse books to show newest first!
            books.reverse().forEach(b => {
                // Format Genres into nice badges
                let genreHTML = '<span class="text-muted small">Uncategorized</span>';
                if (b.genres && b.genres.trim() !== '') {
                    genreHTML = b.genres.split(',').map(g =>
                        `<span class="badge badge-custom me-1 mb-1">${g.trim()}</span>`
                    ).join('');
                }
                // Avatar cover (UI Avatars)
                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(b.title)}&background=random&color=fff&size=400&bold=true&format=svg`;
                const card = document.createElement('div');
                card.className = 'col';
                card.innerHTML = `
                    <div class="card h-100 d-flex flex-column">
                        <div class="book-cover-placeholder">
                            <img src="${avatarUrl}" alt="COVER" loading="lazy">
                            <div class="author-badge"><i class="bi bi-pen-fill me-1"></i> ${b.author}</div>
                        </div>
                        <div class="card-body flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title fw-bold">
                                    ${b.title}
                                </h5>
                                <span class="badge bg-light text-secondary border ml-2">#${b.id}</span>
                            </div>
                            <div class="card-divider"></div>
                            <div class="mb-3 d-flex flex-wrap align-items-center">
                                ${genreHTML}
                                <span class="ms-auto small text-muted"><i class="bi bi-calendar3 me-1"></i>${b.date || 'Unknown'}</span>
                            </div>
                            <p class="card-text small text-secondary" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;" title="${b.synopsis}">
                                ${b.synopsis || 'No synopsis provided.'}
                            </p>
                        </div>
                        <div class="card-footer bg-transparent border-0 pt-0 pb-4 px-4 d-flex justify-content-between">
                            <button class="btn btn-sm btn-light text-primary flex-grow-1 me-2 fw-bold" onclick="openEditModal('${b.id}')"><i class="bi bi-pencil-square me-1"></i> Edit</button>
                            <button class="btn btn-sm btn-light text-danger bg-white border fw-bold" onclick="deleteBook('${b.id}', '${b.title.replace(/'/g, "\\'")}')"><i class="bi bi-trash3"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <span>&copy; 2026 BookStack. All rights reserved.</span>
            <span class="ms-2">
                <a href="#" class="text-decoration-none"><i class="bi bi-github"></i></a>
                <a href="#" class="text-decoration-none"><i class="bi bi-twitter"></i></a>
                <a href="#" class="text-decoration-none"><i class="bi bi-linkedin"></i></a>
            </span>
        </div>
    </footer>
</body>
